<div class="cl-auth-wrapper">
  <div class="cl-bg-deco">
    <span class="deco-circle c1"></span>
    <span class="deco-circle c2"></span>
    <span class="deco-circle c3"></span>
    <span class="deco-tri t1"></span>
    <span class="deco-tri t2"></span>
    <span class="deco-tri t3"></span>
    <span class="deco-tri t4"></span>
    <span class="deco-line l1"></span>
    <span class="deco-line l2"></span>
  </div>

  <div class="cl-auth-card">
    <div class="cl-logo">
      <span class="cl-logo-box">S</span>
      <div class="cl-logo-text">SNEAKER<em>STORE</em></div>
    </div>

    <!-- ── Invalid / Expired Token ── -->
    <div *ngIf="tokenInvalid" class="cl-form">
      <div class="cl-error-icon">⛔</div>
      <p class="cl-page-title" style="text-align:center">LINK EXPIRED</p>
      <p class="cl-page-desc" style="text-align:center">
        This password reset link has expired or is invalid.<br>
        Please request a new one.
      </p>
      <button class="cl-btn" (click)="goLogin()">BACK TO SIGN IN</button>
    </div>

    <!-- ── Reset Form ── -->
    <div *ngIf="!tokenInvalid && !success" class="cl-form">
      <p class="cl-page-title">RESET PASSWORD</p>
      <p class="cl-page-desc">Enter a new password for your account.</p>

      <div *ngIf="errMessage" class="cl-alert cl-alert-error">⚠ {{ errMessage }}</div>

      <div class="cl-field">
        <label>NEW PASSWORD</label>
        <div class="cl-pw-wrap">
          <input [type]="showPw ? 'text' : 'password'" [(ngModel)]="newPassword"
                 placeholder="Minimum 6 characters" (keyup.enter)="submit()"
                 (input)="checkStrength()"/>
          <button class="cl-pw-toggle" (click)="showPw = !showPw" type="button">
            <img [src]="showPw
              ? 'https://api.iconify.design/lucide/eye-off.svg?color=%23aaa'
              : 'https://api.iconify.design/lucide/eye.svg?color=%23aaa'"
              width="16" height="16" alt="">
          </button>
        </div>
        <!-- Password strength bar -->
        <div class="cl-pw-strength" [ngClass]="pwStrength" *ngIf="newPassword.length > 0">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="cl-field">
        <label>CONFIRM PASSWORD</label>
        <input type="password" [(ngModel)]="confirmPassword"
               placeholder="Re-enter your new password" (keyup.enter)="submit()"/>
      </div>

      <button class="cl-btn" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Processing...' : 'CONFIRM' }}
      </button>

      <button class="cl-back-link" (click)="goLogin()" type="button">
        ← Back to Sign In
      </button>
    </div>

    <!-- ── Success ── -->
    <div *ngIf="success" class="cl-form">
      <div class="cl-success-icon">✓</div>
      <p class="cl-page-title" style="text-align:center">ALL DONE!</p>
      <div class="cl-alert cl-alert-success">
        Your password has been reset. Redirecting to sign in...
      </div>
    </div>
  </div>
</div>
